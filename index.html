<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Monitoring Filter Asap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --panel:#141B18;
    --panel-border:#233029;
    --text:#DCE7E1;
    --muted:#7D9187;
    --accent:#4FA0E8;
    --alarm:#FF5B4F;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--text);
    background-image:
      linear-gradient(180deg, rgba(11,16,14,0.75) 0%, rgba(11,16,14,0.85) 100%),
      url('latarlogin.JPG');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .card{
    width:100%;
    max-width:380px;
    background:rgba(20,27,24,0.92);
    border:1px solid var(--panel-border);
    border-radius:18px;
    padding:36px 30px;
    backdrop-filter:blur(6px);
  }

  .logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
  }
  .logos img{
    height:56px;
    width:auto;
    max-width:90px;
    object-fit:contain;
  }

  h1{
    font-size:19px;
    font-weight:600;
    text-align:center;
    margin:0 0 4px;
  }
  .subtitle{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    margin:0 0 28px;
  }

  label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field{margin-bottom:16px;}
  input[type="text"],
  input[type="password"]{
    width:100%;
    padding:11px 14px;
    background:#0F1512;
    border:1px solid var(--panel-border);
    border-radius:10px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    outline:none;
    transition:border-color .2s ease;
  }
  input[type="text"]:focus,
  input[type="password"]:focus{
    border-color:var(--accent);
  }

  .error-msg{
    display:none;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--alarm);
    background:rgba(255,91,79,0.1);
    border:1px solid rgba(255,91,79,0.3);
    border-radius:8px;
    padding:9px 12px;
    margin-bottom:16px;
  }
  .error-msg.show{display:block;}

  button{
    width:100%;
    padding:12px;
    background:var(--accent);
    border:none;
    border-radius:10px;
    color:#0B100E;
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:opacity .2s ease;
    margin-top:6px;
  }
  button:hover{opacity:0.9;}
  button:active{opacity:0.75;}

  footer{
    text-align:center;
    margin-top:22px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
  }

  .kontak-info{
    margin-top:20px;
    text-align:center;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    line-height:1.8;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logos">
      <img src="logoKKN.png" alt="Logo KKN Kelompok 31">
      <img src="logoUniv.png" alt="Logo Universitas">
    </div>

    <h1>Monitoring filter asap</h1>
    <p class="subtitle">KKN Kelompok 31 &middot; Desa Bandungan</p>

    <div class="error-msg" id="errorMsg">Username atau password salah.</div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Masuk</button>
    </form>

    <footer>Akses terbatas &middot; KKN Kelompok 31</footer>
  </div>

  <div class="kontak-info">
    <div>Email: kkndsbandungan@gmail.com</div>
    <div>Instagram: kkn_31_bandungan</div>
    <div>Tiktok: KKN Ds.BANDUNGAN</div>
  </div>

<script>
// ======== GANTI username & password sesuai kebutuhan ========
const VALID_USERNAME = "admin";
const VALID_PASSWORD = "123";
// ==============================================================

const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (username === VALID_USERNAME && password === VALID_PASSWORD) {
    sessionStorage.setItem("loggedIn", "true");
    window.location.href = "menu.html";
  } else {
    errorMsg.classList.add("show");
  }
});
</script>
</body>
</html>
